<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Steam Replica</title>

  <link rel="stylesheet" href="style2.css">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>

  <header class="topbar">
<div class="left-nav">

  <div class="logo">
    <img src="logo.png" alt="">
    <span>STEAM</span>
  </div>

  <nav>
    <a href="#">LOJA</a>
    <a href="#">COMUNIDADE</a>
    <a class="active" href="#">SOBRE</a>
    <a href="#">SUPORTE</a>
  </nav>

</div>

    <div class="right-nav">

      <button class="install-btn">
        Instale o Steam
      </button>

      <a href="#">iniciar sessão</a>
      <a href="#">idioma</a>

    </div>

  </header>

  <section class="subnav">

    <div class="sub-links">
      <a href="#">Explorar</a>
      <a href="#">Recomendações</a>
      <a href="#">Categorias</a>
      <a href="#">Formas de jogar</a>
      <a href="#">Seções especiais</a>
    </div>

    <div class="search-box">
      <input type="text" placeholder="Buscar na loja">
      <button>🔍</button>
    </div>

  </section>

  <main class="hero">

    <div class="hero-left">

      <div class="steam-title">

      <img src="logo.png" alt="">
        <h1>STEAM</h1>

      </div>

      <p class="description">
        O Steam é o destino perfeito para jogar,
        criar jogos e conversar.
      </p>

      <div class="stats">

        <div class="stat">
          <span class="dot blue"></span>

          <div>
            <h3>ON-LINE</h3>
            <p>23,412,132</p>
          </div>
        </div>

        <div class="stat">
          <span class="dot green"></span>

          <div>
            <h3>JOGANDO AGORA</h3>
            <p>5,344,883</p>
          </div>
        </div>

      </div>

      <button class="big-install">
        INSTALE O STEAM
      </button>

      <div class="platforms">

        </div>

      </div>

    </div>

    <div class="hero-right">

      <div class="monitor">

        <img
          src="https://shared.cloudflare.steamstatic.com/store_item_assets/steam/clusters/frontpage/4c9e89b297b8b3f53c08c5b1/movie480_vp9.webm?t=1726167806"
          alt=""
        >

        <div class="fake-screen">
          <img
            src="fake.png"
            alt=""
          >
        </div>

      </div>

    </div>

  </main>

  <div class="learn-more">
    <p>SAIBA MAIS</p>
    <span>⌄</span>
  </div>

</body>
</html>
